trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  # General variables
  buildConfiguration: 'Release'
  projectName: 'prodigywebapp'
  
  # SonarCloud variables
  sonarCloudConnection: 'SonarCloudConnection'
  sonarOrganization: 'your-sonar-organization'
  sonarProjectKey: 'your-sonar-project-key'
  
  # Docker Hub variables
  dockerRegistryServiceConnection: 'DockerHubConnection'
  imageRepository: 'yourdockerhubuser/prodigywebapp'
  containerRegistry: 'docker.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'
  
  # Azure App Service variable
  azureSubscription: 'AzureRmConnection'
  webAppName: 'prodigywebapp-service'

stages:
- stage: BuildAndTest
  displayName: 'Build, Test, and Scan'
  jobs:
  - job: BuildJob
    displayName: 'Build and Test'
    steps:
    - task: SonarCloudPrepare@1
      displayName: 'Prepare SonarCloud analysis'
      inputs:
        SonarCloud: '$(sonarCloudConnection)'
        organization: '$(sonarOrganization)'
        scannerMode: 'MSBuild'
        projectKey: '$(sonarProjectKey)'
        projectName: '$(projectName)'

    - task: DotNetCoreCLI@2
      displayName: 'Restore packages'
      inputs:
        command: 'restore'
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Build project'
      inputs:
        command: 'build'
        projects: '**/*.csproj'
        arguments: '--configuration $(buildConfiguration)'

    - task: DotNetCoreCLI@2
      displayName: 'Run tests'
      inputs:
        command: 'test'
        projects: '**/*Tests/*.csproj'
        arguments: '--configuration $(buildConfiguration) --collect "Code Coverage"'
      continueOnError: true

    - task: SonarCloudAnalyze@1
      displayName: 'Run SonarCloud analysis'

    - task: SonarCloudPublish@1
      displayName: 'Publish Quality Gate Result'
      inputs:
        pollingTimeoutSec: '300'

    - script: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
        trivy fs --exit-code 0 --severity HIGH,CRITICAL .
      displayName: 'Trivy FS Scan'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Build Artifacts'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
        publishLocation: 'Container'

- stage: BuildImageAndDeploy
  displayName: 'Build Image, Scan, and Deploy'
  dependsOn: BuildAndTest
  condition: succeeded()
  jobs:
  - job: DockerAndDeploy
    displayName: 'Docker Build, Scan, Push, Deploy'
    steps:
    - task: Docker@2
      displayName: 'Build Docker Image'
      inputs:
        command: 'build'
        repository: '$(imageRepository)'
        dockerfile: '$(dockerfilePath)'
        containerRegistry: '$(dockerRegistryServiceConnection)'
        tags: |
          $(tag)
          latest

    - script: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
        trivy image --exit-code 0 --severity HIGH,CRITICAL $(imageRepository):$(tag)
      displayName: 'Trivy Image Scan'

    - task: Docker@2
      displayName: 'Push Docker Image to DockerHub'
      inputs:
        command: 'push'
        repository: '$(imageRepository)'
        containerRegistry: '$(dockerRegistryServiceConnection)'
        tags: |
          $(tag)
          latest

    - task: AzureWebAppContainer@1
      displayName: 'Deploy to Azure App Service'
      inputs:
        azureSubscription: '$(azureSubscription)'
        appName: '$(webAppName)'
        containers: '$(containerRegistry)/$(imageRepository):$(tag)'
